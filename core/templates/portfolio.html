{% extends "base.html" %}
{% block content %}

<section class="py-5 mt-5">
    <div class="container text-center">
        <h1 class="fw-bold">Build Your Portfolio</h1>
        <p class="text-muted">Showcase tasks you’ve completed to gain more trust.</p>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="card border-0 shadow-lg rounded-4 p-4">
            <h4 class="fw-bold">Add Completed Work</h4>
            <form>
                <label class="fw-semibold mt-3">Task Title</label>
                <input class="form-control rounded-pill" />

                <label class="fw-semibold mt-3">Proof of Work</label>
                <input type="file" class="form-control rounded-pill" />

                <label class="fw-semibold mt-3">Description</label>
                <textarea class="form-control rounded-4" rows="4"></textarea>

                <button class="btn btn-primary rounded-pill px-5 mt-4">Save</button>
            </form>
        </div>
    </div>
</section>

{% endblock %}
