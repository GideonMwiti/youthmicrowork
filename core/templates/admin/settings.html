{% extends "base.html" %}
{% block content %}

<section class="py-5">
    <div class="container">
        <h2 class="fw-bold mb-4">Admin Settings</h2>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Platform Settings</h5>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Site Name</label>
                            <input type="text" class="form-control" value="YouthMicroWork">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Site Description</label>
                            <textarea class="form-control" rows="3">Empowering youth with micro-work opportunities</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Default User Role</label>
                            <select class="form-select">
                                <option selected>MicroWorker</option>
                                <option>Admin</option>
                            </select>
                        </div>
                        
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="registrationSwitch" checked>
                            <label class="form-check-label" for="registrationSwitch">Allow User Registration</label>
                        </div>
                        
                        <button class="btn btn-primary">Save Changes</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Task Settings</h5>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Maximum Tasks per User</label>
                            <input type="number" class="form-control" value="10">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Task Approval Required</label>
                            <select class="form-select">
                                <option selected>Yes</option>
                                <option>No</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Default Task Reward ($)</label>
                            <input type="number" class="form-control" value="5.00" step="0.01">
                        </div>
                        
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="autoAssignSwitch" checked>
                            <label class="form-check-label" for="autoAssignSwitch">Auto-assign Tasks</label>
                        </div>
                        
                        <button class="btn btn-primary">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4 mt-4 border-danger">
            <div class="card-body">
                <h5 class="card-title text-danger mb-4">Danger Zone</h5>
                <p class="text-muted mb-4">These actions are irreversible. Please proceed with caution.</p>
                
                <div class="d-flex gap-3">
                    <button class="btn btn-outline-danger">
                        <i class="fas fa-trash me-2"></i>Clear All Data
                    </button>
                    <button class="btn btn-outline-danger">
                        <i class="fas fa-ban me-2"></i>Deactivate Platform
                    </button>
                    <button class="btn btn-outline-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>Emergency Reset
                    </button>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-primary">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>
    </div>
</section>

{% endblock %}
