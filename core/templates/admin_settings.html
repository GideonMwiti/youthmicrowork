{% extends "base.html" %}
{% block content %}

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Admin Settings</h2>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-primary">
            <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
        </a>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Platform Settings</h5>
                    <div class="mb-3">
                        <label class="form-label">Site Name</label>
                        <input type="text" class="form-control" value="YouthMicroWork">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Site Description</label>
                        <textarea class="form-control" rows="3">Empowering youth with micro-work opportunities</textarea>
                    </div>
                    <button class="btn btn-primary">Save Changes</button>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">System Status</h5>
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle me-2"></i>System is running normally
                    </div>
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>Last backup: Today, 02:00 AM
                    </div>
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>Disk usage: 65%
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
